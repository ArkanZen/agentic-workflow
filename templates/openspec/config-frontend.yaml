schema: spec-driven
# agentic-workflow-tier: frontend
# agentic-workflow-version: 1.1.2

context: |
  完整项目上下文见 openspec/specs/project.md。
  AI 在生成每个工件时须先读取该文件。

quick_change_criteria: |
  以下情形均可走快速通道（缺一不可）：
  1. 改动范围 ≤ 3 个文件
  2. 不涉及新功能、架构调整、安全敏感逻辑
  3. Root cause 明确（bug 修复）或改动意图无歧义（文案/样式）
  适用类型：纯文案/翻译调整、CSS 样式修改（不改组件结构）、
            已知 bug 修复、文档更新。
  不适用：任何涉及数据流变更、新接口、外部调用、配置处理的改动。

rules:
  proposal:
    - 提案控制在 600 字以内。
    - 必须包含「非目标」章节，明确圈定边界。
    - 安全规则：禁止在任何工件中写入 Token、密码或内部地址。
      只引用配置键名，不写实际值。

  specs:
    - Delta spec 须用「扩展/覆盖」语言引用 system.md 中已有基线，不重复陈述。

  design:
    - |
      关卡：在撰写 design.md 前，必须调用 /plan-eng-review。
      若变更包含 UI 组件，还须调用 /plan-design-review。
      将两个关卡结果均记录在 design.md 最顶部：

        ## 关卡：工程审查
        状态：通过 | 仅警告 | 阻断
        审查者：gstack/plan-eng-review
        问题清单：<逐条列出，或填「无」>

        ## 关卡：设计审查（仅 UI 变更）
        状态：通过 | 仅警告 | 阻断
        审查者：gstack/plan-design-review
        问题清单：<逐条列出，或填「无」>

      任意关卡状态为「阻断」则停止。

  tasks:
    - |
      关卡检查：读取 design.md 顶部的工程审查关卡，确认状态为「通过」或「仅警告」。
      若状态为「阻断」或关卡章节缺失，立即停止并输出：
      「阻断：设计关卡未通过，请先修改提案。」
    - 若 design.md 顶部含「UI 设计审查」关卡，须在生成第一个 task 之前确认该关卡状态为「通过」或「仅警告」，否则中止并要求完成 UI 设计审查。
    - 每个任务的实现工作量控制在 2–3 小时以内。
    - 每个任务须注明它实现的是哪个 spec 章节。

commit_checkpoints:
  start:
    enabled_for: [wf-small, wf-complex]
    behavior: |
      运行 git status --short。若无未提交文件，静默继续。
      若有未提交文件：
        展示文件列表，提示"检测到 N 个文件未提交（上次变更遗留），建议先提交再开始新需求"。
        询问用户：请输入 commit message（或输入 'ai' 让 AI 帮你生成，输入 's' 跳过）。
        用户输入 message：执行 git add -A && git commit -m "<message>"。
        用户输入 'ai'：读取 git diff，生成 message，展示给用户确认后执行 git commit。
        用户输入 's' 或直接回车：直接进入工作流，不再追问。

  end:
    enabled_for: [wf-quick, wf-small, wf-complex]
    behavior: |
      验证通过后，基于当前会话已有的 proposal 标题和 tasks 列表（无需额外读取文件）
      生成 conventional commit message（类型从 feat/fix/docs/refactor 中选择）。
      message body 包含本次 tasks 的摘要列表。
      展示给用户，询问 [Y/编辑/跳过]。
      用户选 Y：执行 git add -A && git commit -m "<message>"，输出 commit hash，进入归档询问。
      用户选编辑：用用户提供的 message 执行提交，进入归档询问。
      用户跳过：直接进入归档询问，不再追问。
      注意：此步骤不读取 git diff，所有 message 素材来自会话上下文，避免额外 token 开销。
