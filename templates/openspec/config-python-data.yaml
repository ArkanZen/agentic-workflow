schema: spec-driven
# agentic-workflow-tier: python-data
# agentic-workflow-version: __WORKFLOW_VERSION__

context: |
  本项目为 Python 数据/报表类项目。openspec/specs/project.md 含完整上下文。
  AI 在生成工件时须先读取该文件。
  宿主命令映射：Claude Code 使用 /plan-eng-review、/plan-design-review、/cso、/review；
  Codex App 使用 /gstack-plan-eng-review、/gstack-plan-design-review、/gstack-cso、/gstack-review。

  ## 文件命名规范
  - 设计文档（docs/ 下的独立 spec 文档、设计稿等）文件名使用中文描述，
    日期前缀保留 YYYY-MM-DD 格式（例：2026-05-21-新站点详情页设计.md）。
    项目专有名词（API 名称、模型名、功能 key、技术术语）可保留英文。
  - OpenSpec change 目录名（openspec/changes/<name>/）继续使用 kebab-case 英文，
    便于文件系统和 CLI 兼容。change 内部工件标题（H1）应使用中文。

# 快速通道判定标准（满足以下全部条件时可用 /wf-quick 跳过 design gate）
quick_change_criteria: |
  以下情形均可走快速通道（缺一不可）：
  1. 改动范围 ≤ 3 个文件
  2. 不涉及新功能、架构调整、安全敏感逻辑
  3. Root cause 明确（bug 修复）或改动意图无歧义（文案/样式）
  适用类型：纯文案/翻译调整、Jupyter 注释/文档更新、
            已知 bug 修复、文档更新。
  不适用：任何涉及数据流变更、新接口、外部调用、配置处理的改动。
  不适用：任何涉及 SQL 查询、聚合逻辑、报表指标或数据口径的改动。

risk_triggers:
  spec_change:
    when: 新功能、行为变化、接口变化、项目可见能力变化。
    capabilities: [openspec-propose, openspec-apply-change, openspec-archive-change]
  architecture:
    when: 跨模块、数据流、边界调整、核心抽象变化。
    capabilities: [/plan-eng-review]
  data_metric:
    when: SQL、聚合逻辑、指标口径、报表下游影响或时间边界。
    capabilities: [data-metric-review]
  security:
    when: 凭证、权限、认证鉴权、外部 API、部署配置或敏感数据处理。
    capabilities: [/cso]
  test_driven:
    when: 新行为、核心逻辑、修 bug 防回归或需要先约束行为。
    capabilities: [superpowers:test-driven-development]
  final_verification:
    when: 所有实现型任务在声明完成前都需要验证。
    capabilities: [superpowers:verification-before-completion]

rules:
  proposal:
    - 提案控制在 600 字以内。
    - 必须包含「非目标」章节，明确圈定边界。
    - 安全规则：禁止在任何工件中写入 Token、密码、凭证或内部地址。
      只引用配置键名，不写实际值。
    - 路径展示规则：每次生成或写入任何工件（proposal、design、tasks、spec 文档）后，
      必须输出该文件的完整绝对路径（而非相对路径）。

  specs:
    - Delta spec 须用「扩展/覆盖」语言引用 system.md 中已有基线，不重复陈述。

  design:
    - |
      关卡：在撰写 design.md 正文前，必须调用 /plan-eng-review 审查提案。
      将审查结果记录在 design.md 最顶部，格式如下：

        ## 关卡：工程审查
        状态：通过 | 仅警告 | 阻断
        审查者：gstack/plan-eng-review
        问题清单：<逐条列出，或填「无」>

      若状态为「阻断」，立即停止，不得继续撰写 design.md 其余内容。
      告知用户修改提案后再继续。
    - |
      关卡（数据口径审查）：若变更涉及 SQL 查询、聚合计算、数据指标或报表口径，
      须在工程审查之后额外执行数据口径审查，并追加记录：

        ## 关卡：数据口径审查
        状态：通过 | 阻断
        审查者：AI 自审（依据以下检查项）
        问题清单：<逐条列出，或填「无」>

      检查项（逐一确认）：
      1. 聚合逻辑正确性：GROUP BY 字段、聚合函数（SUM/COUNT/AVG）语义是否符合业务定义
      2. 过滤条件：WHERE 条件是否遗漏必要的业务过滤（如状态、来源、租户隔离）
      3. 日期范围处理：边界是否闭合正确，时区是否一致，是否覆盖跨月/跨年边界
      4. NULL 与类型安全：关键字段是否有 NULL 保护，类型转换是否可能产生截断或溢出
      5. 下游影响：本次口径变更影响哪些报表或下游数据表，是否已在提案中说明

      任意检查项未通过则状态为「阻断」，立即停止，告知用户修正口径后再继续。
    - |
      关卡（安全敏感变更）：若变更涉及认证鉴权、外部 API 调用、凭证处理或
      部署配置，须额外调用 /cso，并追加记录：

        ## 关卡：安全审查
        状态：通过 | 阻断
        审查者：gstack/cso
        问题清单：<逐条列出，或填「无」>

  tasks:
    - |
      关卡检查：读取 design.md 顶部的工程审查关卡，确认状态为「通过」或「仅警告」。
      若状态为「阻断」或关卡章节缺失，立即停止并输出：
      「阻断：设计关卡未通过，请先修改提案。」
    - |
      关卡检查（数据口径）：若 design.md 中存在数据口径审查关卡，确认状态为「通过」。
      若状态为「阻断」，立即停止并输出：
      「阻断：数据口径审查未通过，请先修正 SQL/聚合逻辑。」
    - 每个任务的实现工作量控制在 2–3 小时以内。
    - 每个任务须注明它实现的是哪个 spec 章节。

commit_checkpoints:
  start:
    enabled_for: [wf-small, wf-complex]
    behavior: |
      运行 git status --short。若无未提交文件，静默继续。
      若有未提交文件：
        展示文件列表，提示"检测到 N 个文件未提交（上次变更遗留），建议先提交再开始新需求"。
        在 Codex App 中优先使用 UI 交互工具展示选项：
          A. 提交现有改动（推荐：让 AI 生成 message，展示确认后提交）
          B. 跳过 checkpoint，继续当前 workflow
          C. 取消当前 workflow
        UI 工具不可用时，退化为文本选项：ai / s / cancel。
        用户选择提交：读取 git diff，生成 message，展示给用户确认后执行 git add -A && git commit。
        用户选择跳过：直接进入工作流，不再追问。
        用户选择取消：停止 workflow，不做后续动作。

  end:
    enabled_for: [wf-quick, wf-small, wf-complex]
    behavior: |
      此 checkpoint 必须在归档决策之后执行：如果用户选择归档，应先完成 /openspec-archive-change
      及 spec sync，再进入最终提交；如果用户选择暂不归档，则提交 active change 和实现改动。
      基于当前会话已有的 proposal 标题、tasks 列表、验证结果和归档结果生成 conventional commit message
      （类型从 feat/fix/docs/refactor 中选择）。
      message body 包含本次 tasks 的摘要列表。
      在 Codex App 中优先使用 UI 交互工具展示选项：
        A. 使用建议 message 提交（推荐）
        B. 编辑 message 后提交
        C. 跳过提交
      UI 工具不可用时，退化为文本选项：Y / 编辑 / 跳过。
      用户选择提交：执行 git add -A && git commit -m "<message>"，输出 commit hash。
      用户跳过：保留工作区改动，并明确提示尚未提交。
